version: "3.8"

# ─────────────────────────────────────────────────────────────────────────────
#  NexusFlow — docker-compose.yml
#  6 services: zookeeper, kafka, redis, backend, frontend, kafka-ui
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── ZooKeeper ────────────────────────────────────────────────────────────────
  # Coordinates the Kafka broker — manages leader election and cluster metadata.
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # ── Kafka ─────────────────────────────────────────────────────────────────────
  # Event-streaming backbone. Exposes port 9092 to the host (PLAINTEXT_HOST
  # listener) and 29092 internally for inter-container traffic (PLAINTEXT listener).
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # ── Redis ─────────────────────────────────────────────────────────────────────
  # In-memory cache and pub/sub broker. AOF persistence enabled so data survives
  # container restarts. Health-checked via redis-cli ping.
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend ───────────────────────────────────────────────────────────────────
  # FastAPI application. Reads secrets and config from .env. Source-mounted for
  # hot-reload during development — remove the volume bind in production builds.
  #backend:
  #  build: ./backend
   # ports:
     # - "8000:8000"
    #depends_on:
     # - kafka
     # - redis
    #env_file:
     # - .env
    #volumes:
      #- ./backend:/app

  # ── Frontend ──────────────────────────────────────────────────────────────────
  # React + Vite UI. Source-mounted for hot-reload. Proxies API calls to the
  # backend service. Waits for the backend to be available before starting.
  #frontend:
    #build: ./frontend
    #ports:
    #  - "3000:3000"
    #depends_on:
     # - backend
   # env_file:
     # - .env
    #volumes:
     # - ./frontend:/app

  # ── Kafka UI ──────────────────────────────────────────────────────────────────
  # Web-based Kafka management console. Browse topics, consumer groups, and
  # messages without needing a CLI. Connects to Kafka via the internal listener.
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

# ── Named Volumes ─────────────────────────────────────────────────────────────
# redis_data persists Redis AOF/RDB files across container restarts.
volumes:
  redis_data:

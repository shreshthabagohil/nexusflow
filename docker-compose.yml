version: "3.8"

services:
  backend:
    image: ./backend
    ports:
      - "8000:8000"
    networks:
      - nexus-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    networks:
      - nexus-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    ports:
      - "2181:2181"
    networks:
      - nexus-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - nexus-net

  frontend-ui:
    image: ./frontend
    ports:
      - "5173:5173"
    networks:
      - nexus-net

networks:
  nexus-net:
    driver: bridge